services:
  - type: web
    name: healthcoach
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -b 0.0.0.0:$PORT "app.main_flask:app"
    disk:
      name: data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: DATA_DIR
        value: /data
      - key: OURDX_RESPONSES_CSV
        value: /data/raw/ourdx_responses.csv
      - key: SECRET_KEY
        sync: false
      - key: EDITOR_PASSWORD
        sync: false
